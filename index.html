<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WeSafe Connect</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--primary:#1A6B8A;--mid:#2D9B96;--accent:#4ECDC4;--green:#27AE60;--danger:#DC2626;--soft:#EAF7F7;--warn:#B45309;--warnbg:#FFFBEB;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Sarabun','Noto Sans Thai',sans-serif;min-height:100vh;background:linear-gradient(165deg,#F2FBFB 0%,#DFF1F4 60%,#CFE9EE 100%);display:flex;flex-direction:column}
  .hotbar{background:var(--danger);color:#fff;text-align:center;padding:6px 12px;font-size:12.5px;font-weight:600}
  header{background:linear-gradient(90deg,var(--primary),var(--mid));color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.15);flex-wrap:wrap;gap:6px}
  .brand{display:flex;align-items:center;gap:10px}
  .brand img{width:46px;height:46px;border-radius:50%;background:#fff;padding:2px}
  .brand .nm{font-weight:800;font-size:19px;line-height:1}
  .brand .nm span{color:#9FF2C8}
  .brand .sub{font-size:10.5px;opacity:.85}
  .hbtns{display:flex;gap:6px;flex-wrap:wrap}
  .hbtn{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.4);color:#fff;padding:5px 10px;font-size:12px;border-radius:8px;cursor:pointer;font-weight:700;font-family:inherit;text-decoration:none;display:inline-flex;align-items:center}
  .hbtn.hl{background:rgba(255,255,255,.3)}
  .aibar{background:var(--warnbg);border-bottom:1px solid rgba(180,83,9,.27);color:var(--warn);text-align:center;padding:4px 12px;font-size:11.5px}
  .aibar b{font-weight:800}
  main{flex:1;max-width:780px;width:100%;margin:0 auto;padding:16px 16px 90px;display:flex;flex-direction:column}
  .card{background:#fff;border-radius:20px;padding:28px 26px;margin-top:18px;box-shadow:0 6px 24px rgba(26,107,138,.12)}
  .btn{border:none;border-radius:10px;padding:12px 22px;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit}
  .btn.pri{background:linear-gradient(90deg,var(--primary),var(--mid));color:#fff}
  .btn.sec{background:#fff;border:2px solid var(--mid);color:var(--mid)}
  .btn:disabled{background:#D1D5DB !important;cursor:default}
  .chip{border-radius:999px;padding:7px 13px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;border:1.5px solid var(--mid);background:#fff;color:var(--primary)}
  .chip.on{background:var(--mid);color:#fff}
  .chip.pri-on{background:var(--primary);color:#fff;border-color:var(--primary)}
  .rolebtn{text-align:left;background:#fff;border:2px solid #E5E7EB;border-radius:12px;padding:10px 14px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:10px;width:100%}
  .moodrow{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
  .mood{background:#fff;border:2px solid #E5E7EB;border-radius:14px;padding:10px 12px;cursor:pointer;font-family:inherit;text-align:center;min-width:64px}
  .mood.on{background:var(--soft);border-color:var(--mid)}
  .mood .e{font-size:26px}.mood .l{font-size:11px;font-weight:700;color:#6B7280}
  .drawer{background:#fff;padding:12px 16px;border-bottom:3px solid var(--accent)}
  .drawer h4{font-size:12.5px;font-weight:800;color:var(--primary);margin-bottom:8px;text-align:center}
  .drawer .row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
  .resitem{background:var(--soft);border:1.5px solid rgba(45,155,150,.33);border-radius:10px;padding:6px 12px;font-size:12.5px}
  .ngo{display:flex;align-items:center;gap:8px;background:#F0FDF4;border:1.5px solid rgba(39,174,96,.4);border-radius:10px;padding:6px 12px;font-size:12.5px}
  .ngo a{color:var(--green);font-weight:800;text-decoration:none;font-size:11.5px;border:1.5px solid var(--green);border-radius:999px;padding:2px 9px;background:#fff}
  .learnitem{border:1.5px solid rgba(45,155,150,.33);border-radius:12px;padding:8px 12px;background:var(--soft);display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:700;color:#374151}
  .learnitem button{background:var(--primary);color:#fff;border:none;border-radius:999px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
  .learnitem a{background:#fff;color:var(--green);border:1.5px solid var(--green);border-radius:999px;padding:3px 10px;font-size:11px;font-weight:700;text-decoration:none}
  .agentstrip{background:#fff;border-radius:14px;padding:10px 14px;box-shadow:0 1px 6px rgba(0,0,0,.06);margin-bottom:10px}
  .lives{display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap}
  .lives span{background:var(--soft);color:var(--primary);border-radius:6px;padding:2px 7px;font-size:10.5px;font-weight:700}
  .alert{border-radius:12px;padding:14px;margin-bottom:10px}
  .alert.crisis{background:#FEF2F2;border:2px solid var(--danger)}
  .alert.minor{background:#FFF7ED;border:2px solid var(--warn)}
  #msgs{flex:1;display:flex;flex-direction:column;gap:10px}
  .umsg{align-self:flex-end;max-width:82%;background:linear-gradient(135deg,var(--mid),var(--accent));color:#fff;border-radius:16px 16px 4px 16px;padding:10px 14px;font-size:14.5px;line-height:1.7;white-space:pre-wrap;box-shadow:0 1px 4px rgba(0,0,0,.08)}
  .amsg{align-self:flex-start;max-width:88%}
  .ahead{display:flex;align-items:center;gap:6px;margin-bottom:3px;flex-wrap:wrap}
  .ahead img{width:20px;height:20px;border-radius:50%}
  .ahead .nm{font-size:11px;font-weight:800;color:var(--primary)}
  .ahead .ai{font-size:9.5px;background:var(--warnbg);color:var(--warn);border-radius:999px;padding:1px 7px;font-weight:800;border:1px solid rgba(180,83,9,.27)}
  .ahead .modchip{background:linear-gradient(90deg,var(--primary),var(--green));color:#fff;border-radius:999px;padding:2px 10px;font-size:10.5px;font-weight:700}
  .ahead .modchip.out{background:#6B7280}
  .ahead .ragchip{background:#fff;color:var(--mid);border:1px solid rgba(45,155,150,.4);border-radius:999px;padding:1px 8px;font-size:9.5px;font-weight:700}
  .abody{background:#fff;color:#1F2937;border-radius:16px 16px 16px 4px;padding:11px 15px;font-size:14.5px;line-height:1.8;white-space:pre-wrap;box-shadow:0 1px 4px rgba(0,0,0,.08);border-left:3px solid var(--accent)}
  .deeplink{display:inline-flex;align-items:center;gap:6px;margin-top:5px;background:#fff;border:1.5px solid var(--green);color:var(--green);border-radius:999px;padding:5px 14px;font-size:12px;font-weight:700;text-decoration:none}
  .inrow{display:flex;gap:8px;margin-top:14px}
  .inrow input{flex:1;border:2px solid rgba(78,205,196,.4);border-radius:999px;padding:11px 18px;font-size:14.5px;outline:none;font-family:inherit;background:#fff}
  .inrow button{background:linear-gradient(90deg,var(--primary),var(--mid));color:#fff;border:none;border-radius:999px;padding:0 22px;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit}
  .disc{font-size:10.5px;color:#9CA3AF;text-align:center;margin-top:8px;line-height:1.5}
  .exitbtn{position:fixed;bottom:18px;right:18px;background:var(--danger);color:#fff;border-radius:999px;padding:12px 20px;font-weight:700;font-size:14px;text-decoration:none;box-shadow:0 4px 14px rgba(220,38,38,.45);z-index:60}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:70;display:flex;align-items:center;justify-content:center;padding:16px}
  .mbox{background:#fff;border-radius:18px;max-width:440px;width:100%;padding:24px;box-shadow:0 10px 40px rgba(0,0,0,.3);text-align:center}
  .hidden{display:none !important}
  .endbtn{background:#fff;border:1.5px solid var(--green);color:var(--green);border-radius:999px;padding:4px 12px;font-size:11.5px;font-weight:700;cursor:pointer;font-family:inherit}
  .qp{background:#fff;border-radius:999px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
</style>
</head>

function buildSystem(rag){

 const rg=rag.length?`\n=== RETRIEVED CONTEXT (RAG จากคู่มือ WeSafe ใช้เป็นแหล่งหลัก) ===\n${rag.map(c=>`[${c.m}] ${c.t}`).join("\n")}`:"";
 return `You are WeSafe Connect — ส่วนขยาย AI โดยตรงของแอป WeSafe (ไม่ใช่ chatbot ทั่วไป) — Thai adaptation of myPlan (Johns Hopkins, Prof. Nancy Glass) by Asst. Prof. Dr. Tipparat Udmuangpia, BCNKK, NIH K43. BRIDGE Framework (เรื่องในบ้าน เกรงใจ เสียหน้า) + SAMHSA trauma-informed.
YOUR USER: ${AGENTS[S.agent].persona}
${ic}
RULES:
1. ตอบโดยอิง RETRIEVED CONTEXT เป็นหลัก เนื้อหามาจากงานวิจัย เมื่อเหมาะสมบอกผู้ใช้ว่าแนวทางมาจาก WeSafe
2. เริ่มทุกคำตอบด้วย tag หนึ่งบรรทัด [MODULE:<ชื่อหมวด>] จาก: ${MODULE_LIST} — นอกคู่มือใช้ [MODULE:นอกคู่มือ] และบอกตรงๆ ห้ามแต่งสถิติ เบอร์โทร หรือข้อกฎหมาย
3. ภาษาพูดธรรมชาติ ย่อหน้าสั้น อบอุ่น ห้ามใช้ markdown ทุกชนิด ห้าม * ** # bullet (Agent C ใช้ 1. 2. ได้เมื่อสอนขั้นตอน)
4. AI DISCLOSURE: คุณคือ AI เปิดเผยเมื่อถูกถาม เมื่อผู้ใช้ผูกพันทางอารมณ์ให้ชวนเชื่อมต่อกับคนจริงอย่างอ่อนโยน
5. CHILD SAFETY: ผู้ใช้ต่ำกว่า 18 ปี ใช้ภาษาเหมาะกับวัย ยืนยันว่าเขาไม่ผิด แนะนำบอกผู้ใหญ่ที่ไว้ใจ สายเด็ก 1387 และ 1300 ไม่ให้เด็กจัดการสถานการณ์อันตรายลำพัง
6. LIVES: Listen และ Validate ก่อน แล้ว Inquire, Enhance safety, Support
7. อันตรายเฉียบพลัน/คิดทำร้ายตัวเอง ให้เบอร์ก่อน: 191, 1300, 1323, 1669, 1387, OSCC
8. แนะนำการประเมิน/วางแผนให้ชวนใช้เครื่องมือในแอป WeSafe ระบบแสดงปุ่มลิงก์อัตโนมัติ${rg}
Respond in ${S.lang==="th"?"Thai":"English"}, under 130 words, end with one gentle follow-up question.`;
}

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function clean(s){return s.replace(/\*\*(.+?)\*\*/g,"<b>$1</b>").replace(/(^|\s)\*(\s|$)/g,"$1$2");}
function parseMod(txt){const m=txt.match(/^\s*\[MODULE:(.+?)\]\s*\n?/);if(!m)return{mod:null,body:txt.trim()};return{mod:m[1].trim(),body:txt.replace(m[0],"").trim()};}

function render(){
 $("hotbar").textContent=t().hot;$("subTag").textContent=t().sub;$("aibar").innerHTML=t().ai;$("exitBtn").textContent=t().exit;
 const hb=$("hbtns");hb.innerHTML="";
 hb.insertAdjacentHTML("beforeend",`<a class="hbtn hl" href="${APP_URL}" target="_blank" rel="noreferrer">${t().openApp}</a>`);
 if(S.step===3){
  hb.insertAdjacentHTML("beforeend",`<button class="hbtn" onclick="toggleDrawer('learn')">${t().learn}</button>`);
  hb.insertAdjacentHTML("beforeend",`<button class="hbtn" onclick="toggleDrawer('res')">${t().res}</button>`);
  hb.insertAdjacentHTML("beforeend",`<button class="hbtn" onclick="switchAgent()">${t().sw}</button>`);
 }
 hb.insertAdjacentHTML("beforeend",`<button class="hbtn" onclick="toggleLang()">${S.lang==="th"?"EN":"ไทย"}</button>`);
 renderDrawers();
 const m=$("main");
 if(S.step===0)m.innerHTML=screen0();
 else if(S.step===1)m.innerHTML=screen1();
 else if(S.step===2)m.innerHTML=screen2();
 else{m.innerHTML=screen3();renderMsgs();}
}
function toggleLang(){S.lang=S.lang==="th"?"en":"th";render();}
function toggleDrawer(d){const L=$("drawerLearn"),R=$("drawerRes");if(d==="learn"){L.classList.toggle("hidden");R.classList.add("hidden");}else{R.classList.toggle("hidden");L.classList.add("hidden");}}
function switchAgent(){S.step=2;S.msgs=[];S.crisis=false;S.minor=false;$("drawerLearn").classList.add("hidden");$("drawerRes").classList.add("hidden");render();}

function renderDrawers(){
 const L=$("drawerLearn");
 L.innerHTML=`<h4>${t().learnT}</h4><div class="row">${LEARN.map((tp,i)=>`<div class="learnitem"><span style="font-size:18px">${tp.icon}</span><span>${S.lang==="th"?tp.th:tp.en}</span><button onclick="sendMsg(LEARN[${i}].ask)">${t().brief}</button><a href="${MODULES[tp.mod].link}" target="_blank" rel="noreferrer">${t().open} ↗</a></div>`).join("")}</div>`;
 L.style.borderBottomColor="var(--green)";
 const R=$("drawerRes");
 R.innerHTML=`<h4>${t().hotT}</h4><div class="row">${t().rl.map(([n,l])=>`<div class="resitem"><b style="color:var(--primary)">${n}</b> <span style="color:#374151">${l}</span></div>`).join("")}</div>
 <h4 style="margin-top:10px">${t().ngoT}</h4><div class="row">${NGOS.map(n=>`<div class="ngo"><span>${S.lang==="th"?n.th:n.en}</span><a href="${APP_URL}/resources" target="_blank" rel="noreferrer">${t().ngoLink}</a></div>`).join("")}</div>`;
}

  ${PRIS.map((p,i)=>`<button class="chip ${S.pri===i?"pri-on":""}" style="border-color:var(--primary)" onclick="S.pri=${i};render()">${S.pri===i?"★ ":""}${S.lang==="th"?p[0]:p[1]}</button>`).join("")}</div>
 <div style="font-weight:700;font-size:14px;margin-bottom:8px">4. ${t().md}</div>
 <div class="moodrow">${MOODS.map((m,i)=>`<button class="mood ${S.preMood===i+1?"on":""}" onclick="S.preMood=${i+1};render()"><div class="e">${m[0]}</div><div class="l">${S.lang==="th"?m[1]:m[2]}</div></button>`).join("")}</div>
 <div style="display:flex;gap:10px;margin-top:22px">
  <button class="btn sec" style="flex:1" onclick="S.step=1;render()">← ${t().back}</button>
  <button class="btn pri" style="flex:2" ${S.agent?"":"disabled"} onclick="S.step=3;render()">${t().start} →</button></div></div>`;}

function screen3(){const a=AGENTS[S.agent];return `
 <div class="agentstrip" style="border-left:5px solid ${a.color}">
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px">
   <div style="display:flex;align-items:center;gap:10px"><span style="font-size:22px">${a.icon}</span><div style="font-weight:700;color:${a.color};font-size:13.5px">${S.lang==="th"?a.nt:a.ne}</div></div>
   <button class="endbtn" onclick="openPost()">${t().end}</button></div>
  <div class="lives"><span style="background:none;color:#6B7280">${t().lives}:</span>${LIVES.map(l=>`<span><b>${l[0]}</b> ${S.lang==="th"?l[1]:l[2]}</span>`).join("")}</div></div>
 <div id="crisisCard" class="alert crisis ${S.crisis?"":"hidden"}"><div style="font-weight:800;color:var(--danger);font-size:14px;margin-bottom:6px">${t().crT}</div>${t().rl.map(([n,l])=>`<div style="font-size:13px;color:#7F1D1D;font-weight:600;line-height:1.8">📞 <b>${n}</b> — ${l}</div>`).join("")}</div>
 <div id="minorCard" class="alert minor ${S.minor?"":"hidden"}"><div style="font-weight:800;color:var(--warn);font-size:14px;margin-bottom:4px">${t().miT}</div><div style="font-size:13px;color:#7C2D12;line-height:1.7">${t().miB}</div></div>
 <div id="quick" class="${S.msgs.length?"hidden":""}" style="margin-bottom:10px">
  <div style="font-size:12px;font-weight:700;color:#6B7280;margin-bottom:8px">${t().qt}</div>
  <div style="display:flex;flex-wrap:wrap;gap:8px">${(S.lang==="th"?a.pt:a.pe).map((p,i)=>{const u=p.startsWith("🚨");return `<button class="qp" style="border:1.5px solid ${u?"var(--danger)":a.color};color:${u?"var(--danger)":a.color};background:${u?"#FEF2F2":"#fff"}" onclick="sendQuick(${i})">${p}</button>`;}).join("")}</div></div>
 <div id="msgs"></div>
 <div class="inrow"><input id="inp" placeholder="${t().ph}" onkeydown="if(event.key==='Enter')sendMsg()"><button onclick="sendMsg()">${t().send}</button></div>
 <p class="disc">${t().disc}</p>`;}

function togSign(i){S.signs=S.signs.includes(i)?S.signs.filter(x=>x!==i):[...S.signs,i];render();}
function sendQuick(i){const a=AGENTS[S.agent];sendMsg((S.lang==="th"?a.pt:a.pe)[i]);}

function msgHTML(m){
 if(m.role==="user")return `<div class="umsg">${esc(m.content)}</div>`;
 const{mod,body}=parseMod(m.content);const M=mod&&MODULES[mod];const out=mod==="นอกคู่มือ";
 let chips="";
 if(M)chips+=`<span class="modchip ${out?"out":""}">${M.icon} ${out?t().outChip:`${t().kb} • ${S.lang==="th"?mod:M.en}`}</span>`;
 if(m.rag&&m.rag.length)chips+=`<span class="ragchip">🔎 ${t().rag}: ${m.rag.join(" • ")}</span>`;
 let link="";
 if(M&&M.link&&!out)link=`<br><a class="deeplink" href="${M.link}" target="_blank" rel="noreferrer">🕊️ ${S.lang==="th"?M.lt:M.le} ↗</a>`;
 return `<div class="amsg"><div class="ahead"><img src="${LOGO}"><span class="nm">WeSafe Connect</span><span class="ai">AI</span>${chips}</div><div class="abody">${clean(esc(body))}</div>${link}</div>`;
}
function renderMsgs(){const box=$("msgs");if(!box)return;box.innerHTML=S.msgs.map(msgHTML).join("");window.scrollTo(0,document.body.scrollHeight);}

// ---------------- chat (streaming for speed) ----------------
async function sendMsg(text){
 const inp=$("inp");const content=(text??(inp?inp.value:"")).trim();
 if(!content||S.loading)return;
 if(inp)inp.value="";
 $("drawerLearn").classList.add("hidden");$("drawerRes").classList.add("hidden");
 S.msgs.push({role:"user",content});
 const lc=content.toLowerCase();
 if(CRISIS_W.some(w=>lc.includes(w.toLowerCase()))){S.crisis=true;const c=$("crisisCard");if(c)c.classList.remove("hidden");}
 if(MINOR_W.some(w=>lc.includes(w.toLowerCase()))){S.minor=true;const c=$("minorCard");if(c)c.classList.remove("hidden");}
 const q=$("quick");if(q)q.classList.add("hidden");
 renderMsgs();
 const rag=retrieve(content);
 S.loading=true;
 // placeholder for streaming
 const box=$("msgs");
 const ph=document.createElement("div");
 ph.innerHTML=`<div class="amsg"><div class="ahead"><img src="${LOGO}"><span class="nm">WeSafe Connect</span><span class="ai">AI</span></div><div class="abody" id="streamBody" style="color:#9CA3AF">${t().typing}</div></div>`;
 box.appendChild(ph);window.scrollTo(0,document.body.scrollHeight);
 const payload={model:"claude-sonnet-4-20250514",max_tokens:600,system:buildSystem(rag),
  messages:S.msgs.map(m=>({role:m.role,content:m.role==="assistant"?m.content:m.content}))};
 let full="";
 try{
  // try streaming first (faster perceived response)
  const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({...payload,stream:true})});
  const ctype=res.headers.get("content-type")||"";
  if(res.ok&&res.body&&ctype.includes("text/event-stream")){
   const reader=res.body.getReader();const dec=new TextDecoder();let buf="";
   const sb=document.getElementById("streamBody");
   while(true){
    const{done,value}=await reader.read();if(done)break;
    buf+=dec.decode(value,{stream:true});
    const lines=buf.split("\n");buf=lines.pop();
    for(const line of lines){
     if(!line.startsWith("data:"))continue;
     const d=line.slice(5).trim();if(d==="[DONE]")continue;
     try{const ev=JSON.parse(d);
      if(ev.type==="content_block_delta"&&ev.delta&&ev.delta.text){
       full+=ev.delta.text;
       const{body}=parseMod(full);
       sb.style.color="#1F2937";sb.innerHTML=clean(esc(body||"…"));
       window.scrollTo(0,document.body.scrollHeight);
      }}catch(e){}
    }
   }
  }else{
   // fallback: non-streaming
   const r2=res.ok?res:await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
   const data=await r2.json();
   full=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n").trim();
  }
 }catch(e){
  if(!full){
   try{
    const r3=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
    const d3=await r3.json();
    full=(d3.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n").trim();
   }catch(e2){full="";}
  }
 }
 ph.remove();
 S.msgs.push({role:"assistant",content:full||("[MODULE:แหล่งช่วยเหลือ]\n"+t().err),rag:rag.map(c=>c.m)});
 S.loading=false;renderMsgs();
}

// ---------------- post-chat mood ----------------
function openPost(){
 const M=$("postModal");M.classList.remove("hidden");S.postMood=null;
 M.innerHTML=`<div class="mbox"><img src="${LOGO}" style="width:64px;height:64px">
  <h3 style="color:var(--primary);font-size:17px;font-weight:800;margin:10px 0 14px">${t().postT}</h3>
  <div class="moodrow">${MOODS.map((m,i)=>`<button class="mood" onclick="pickPost(${i+1})"><div class="e">${m[0]}</div><div class="l">${S.lang==="th"?m[1]:m[2]}</div></button>`).join("")}</div>
  <button class="btn sec" style="width:100%;margin-top:16px" onclick="$('postModal').classList.add('hidden')">${t().cont}</button></div>`;
}
function pickPost(v){
 S.postMood=v;const M=$("postModal");
 const better=S.preMood!=null&&v>S.preMood;
 M.innerHTML=`<div class="mbox"><div style="font-size:40px">${MOODS[v-1][0]}</div>
  ${S.preMood!=null?`<div style="font-size:13px;color:#6B7280;margin:6px 0">${MOODS[S.preMood-1][0]} → ${MOODS[v-1][0]}</div>`:""}
  <p style="font-size:14px;color:#374151;line-height:1.8">${better?t().postB:t().postS}</p>
  <div style="display:flex;gap:10px;margin-top:12px">
   <button class="btn sec" style="flex:1" onclick="$('postModal').classList.add('hidden')">${t().cont}</button>
   <a class="btn" style="flex:1;background:var(--danger);color:#fff;text-decoration:none;display:flex;align-items:center;justify-content:center" href="https://www.google.com">${t().close}</a></div></div>`;
}

render();
</script>
